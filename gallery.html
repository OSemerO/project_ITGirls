<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Карусель с Bootstrap 5</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .carousel-item img {
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="container my-5">
      <h2 class="text-center">Адаптивная Карусель</h2>

      <div class="card mt-4">
        <div class="card-body">
          <div id="carouselExample" class="carousel slide" data-bs-interval="0">
            <div class="carousel-indicators">
              <button
                type="button"
                data-bs-target="#carouselExample"
                data-bs-slide-to="0"
                class="active"
                aria-current="true"
                aria-label="Слайд 1"
              ></button>
              <button
                type="button"
                data-bs-target="#carouselExample"
                data-bs-slide-to="1"
                aria-label="Слайд 2"
              ></button>
              <button
                type="button"
                data-bs-target="#carouselExample"
                data-bs-slide-to="2"
                aria-label="Слайд 3"
              ></button>
            </div>
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img
                  src="https://via.placeholder.com/800x400?text=Слайд+1"
                  class="d-block w-100"
                  alt="Изображение Слайда 1"
                />
              </div>
              <div class="carousel-item">
                <img
                  src="https://via.placeholder.com/800x400?text=Слайд+2"
                  class="d-block w-100"
                  alt="Изображение Слайда 2"
                />
              </div>
              <div class="carousel-item">
                <img
                  src="https://via.placeholder.com/800x400?text=Слайд+3"
                  class="d-block w-100"
                  alt="Изображение Слайда 3"
                />
              </div>
            </div>
            <button
              class="carousel-control-prev"
              type="button"
              data-bs-target="#carouselExample"
              data-bs-slide="prev"
            >
              <span
                class="carousel-control-prev-icon"
                aria-hidden="true"
              ></span>
              <span class="visually-hidden">Предыдущий</span>
            </button>
            <button
              class="carousel-control-next"
              type="button"
              data-bs-target="#carouselExample"
              data-bs-slide="next"
            >
              <span
                class="carousel-control-next-icon"
                aria-hidden="true"
              ></span>
              <span class="visually-hidden">Следующий</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
  </body>
</html>
